name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  validate-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: Smoke test Node.js bundle
        run: |
          node dist/bin.node.js --help
          node dist/bin.node.js --version
      - name: Smoke test Bun bundle
        run: |
          bun dist/bin.bun.js --help
          bun dist/bin.bun.js --version
      - name: Smoke test launcher with Bun preferred
        run: dist/create-next-pro --help
      - name: Smoke test launcher with Node.js only
        run: env PATH="$(dirname "$(command -v node)"):/usr/bin:/bin" dist/create-next-pro --help
      - run: npm pack --dry-run
